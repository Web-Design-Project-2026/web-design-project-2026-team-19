<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cart</title>
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <header class="site-header">
      <h1>Your Cart</h1>
      <nav>
        <a href="index.html">Home</a>
        <a href="cart.html" id="cartLink">Cart (0)</a>
      </nav>
    </header>

    <main id="cartSection"></main>

    <!--SIDE CART-->

    <div id="sideCart" class="side-cart">
      <div class="side-cart-header">
        <h2>Your Cart</h2>
        <button id="closeCart" aria-label="Close cart">X</button>
      </div>

      <div id="sideCartItems"></div>

      <div class="side-cart-footer">
        <h3 id="sideCartTotal">Total: 0kr</h3>
        <button id="goToCart">Go to Cart</button>
      </div>
    </div>

    <script src="js/products.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
