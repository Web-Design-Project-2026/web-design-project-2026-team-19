<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Product</title>
    <link rel="stylesheet" href="css/main.css"/>
</head>
<body>

    <header class="site-header">
        <div class="logo-wrap">
          <img src="img/logo.svg" alt="Techify logo">
          
        </div>
 
       <div class="search-container">
        <label for="search" class="sr-only">Search products</label>
        <input id="search" placeholder="Search gadgets..." aria-label="Search products">
       </div>
       <div id="searchResults" class="search-results"></div>

        <nav>
          <a href="index.html">Home</a>
          <a href="index.html">Shop</a>
          <a href="index.html">Deals</a>
          <a href="index.html">Support</a>
          <a href="index.html">Account</a>
          <a href="cart.html" id="cartLink">Cart (0)</a>
        </nav>
    </header>

    <main class="product-layout">
      <section id="productSection"></section>
    </main>

    <!--SIDE CART-->

<div id="sideCart" class="side-cart">
    <div class="side-cart-header">
        <h2>Your Cart</h2>
        <button id="closeCart" aria-label="Close cart">X</button>
    </div>

    <div id="sideCartItems"></div>

    <div class="side-cart-footer">
        <h3 id="sideCartTotal">Total: 0kr</h3>
        <button id="goToCart">Go to Cart</button>
    </div>
</div>

    <script src="js/products.js" defer></script>
    <script src="js/app.js" defer></script>
    
    </body>
    </html>
